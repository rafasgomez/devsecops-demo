name: DevSecOps Pipeline (SAST + Docker Security)

on:
  push:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ==================== SAST con CodeQL ====================
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis (SAST)
        uses: github/codeql-action/analyze@v3

      # ==================== Build Docker ====================
      - name: Build Docker image
        run: docker build -t devsecops-demo:latest .

      # ==================== Verificación Seguridad Docker (Trivy) ====================
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-demo:latest'
          format: 'table'
          exit-code: '0'                  # Cambia a '1' si quieres que falle en HIGH/CRITICAL
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: 'true'

      # ==================== Deploy a GHCR (solo si todo OK) ====================
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & Push image
        run: |
          docker tag devsecops-demo:latest ghcr.io/${{ github.repository_owner }}/devsecops-demo:latest
          docker push ghcr.io/${{ github.repository_owner }}/devsecops-demo:latest
